<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tessellate — a fast, private, client-side tool to arrange batches of images into justified, fixed-scale, or masonry grids. No uploads; everything runs in your browser."
    />
    <meta name="theme-color" content="#141517" />
    <title>Tessellate — Dynamic Image Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Applied synchronously, before first paint, to avoid a flash of the
      // wrong theme. Kept in sync with src/state/ThemeContext.tsx.
      ;(function () {
        try {
          var stored = localStorage.getItem('tessellate:theme')
          var pref = stored ? JSON.parse(stored) : 'system'
          var effective =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
              : pref
          document.documentElement.setAttribute('data-theme', effective)
        } catch {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
