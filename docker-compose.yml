services:
  web:
    build: .
    image: tessellate:latest
    container_name: tessellate
    ports:
      - "${TESSELLATE_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

